services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: practicaprofesional-backend
    ports:
      - "5000:5000"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=${AZURE_CONNECTION_STRING}
    networks:
      - app-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - BUILD_CONFIG=development
    container_name: practicaprofesional-frontend
    ports:
      - "4200:80"
    depends_on:
      - backend
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
