name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend — Build & Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore backend/src/PracticaProfesional.csproj

      - name: Build
        run: dotnet build backend/src/PracticaProfesional.csproj --no-restore -c Release

      - name: Run tests
        run: dotnet test backend/tests/PracticaProfesional.Tests.csproj --no-restore -c Release --logger "console;verbosity=minimal"

  frontend:
    name: Frontend — Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Build (production)
        run: npm run build
        working-directory: frontend
