<div class="page">
  <header class="page-header">
    <button class="btn-back" (click)="cancelar()">← Cursos</button>
    <h1>Editar Curso</h1>
  </header>

  @if (cargando()) {
    <p class="estado">Cargando...</p>
  } @else {
    <form class="form" (ngSubmit)="guardar()">
      @if (error()) { <p class="error">{{ error() }}</p> }

      <div class="campo">
        <label>Año académico</label>
        <input type="text" [value]="anio()" disabled />
      </div>
      <div class="campo">
        <label>Comisión *</label>
        <input type="text" [ngModel]="comision()" (ngModelChange)="comision.set($event)" name="comision" />
      </div>
      <div class="campo">
        <label>Cupo *</label>
        <input type="number" [ngModel]="cupo()" (ngModelChange)="cupo.set($event)" name="cupo" min="1" />
      </div>
      <div class="campo">
        <label>Preceptor</label>
        <input type="text" [value]="preceptorNombre()" disabled />
      </div>

      <div class="acciones">
        <button type="submit" class="btn btn-primary" [disabled]="guardando()">
          {{ guardando() ? 'Guardando...' : 'Guardar cambios' }}
        </button>
        <button type="button" class="btn btn-secondary" (click)="cancelar()">Cancelar</button>
      </div>
    </form>
  }
</div>
