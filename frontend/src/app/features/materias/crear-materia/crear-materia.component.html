<div class="page">
  <header class="page-header">
    <button class="btn-back" (click)="cancelar()">← Materias</button>
    <h1>Nueva Materia</h1>
  </header>

  <form class="form" (ngSubmit)="guardar()">
    @if (error()) { <p class="error">{{ error() }}</p> }

    <div class="campo">
      <label>Nombre *</label>
      <input type="text" [ngModel]="nombre()" (ngModelChange)="nombre.set($event)" name="nombre" placeholder="Ej: Matemática I" />
    </div>
    <div class="campo">
      <label>Carrera *</label>
      <select [ngModel]="carreraId()" (ngModelChange)="carreraId.set($event ? +$event : null)" name="carreraId">
        <option [ngValue]="null">— Seleccionar carrera —</option>
        @for (c of carreras(); track c.id) {
          <option [value]="c.id">{{ c.nombre }} ({{ c.resolucion }})</option>
        }
      </select>
    </div>

    <div class="acciones">
      <button type="submit" class="btn btn-primary" [disabled]="guardando()">
        {{ guardando() ? 'Guardando...' : 'Guardar' }}
      </button>
      <button type="button" class="btn btn-secondary" (click)="cancelar()">Cancelar</button>
    </div>
  </form>
</div>
